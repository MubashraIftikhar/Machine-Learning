<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Meet Transcriber Options</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; padding: 16px; max-width: 720px; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      label { display: block; margin: 8px 0 4px; font-weight: 600; }
      input, select { width: 100%; padding: 8px; box-sizing: border-box; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .help { color: #555; font-size: 12px; margin-top: 8px; }
      .ok { color: #070; }
      .err { color: #a00; }
      .actions { margin-top: 12px; display: flex; gap: 8px; }
      button { padding: 8px 12px; }
    </style>
  </head>
  <body>
    <h1>Meet Transcriber Options</h1>

    <label for="provider">Provider</label>
    <select id="provider">
      <option value="openai">OpenAI Whisper</option>
    </select>

    <div class="row">
      <div>
        <label for="openaiApiKey">OpenAI API Key</label>
        <input id="openaiApiKey" type="password" placeholder="sk-..." />
      </div>
      <div>
        <label for="openaiModel">Model</label>
        <input id="openaiModel" type="text" value="whisper-1" />
      </div>
    </div>

    <div class="actions">
      <button id="save">Save</button>
      <button id="test">Test Transcription</button>
    </div>

    <div id="msg" class="help"></div>

    <script type="module" src="options.js"></script>
  </body>
</html>
